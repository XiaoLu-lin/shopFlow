
user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    #gzip  on;

    #保持连接超时的时间
    keepalive_timeout  3600;

    #所有访问ip 限制每秒10个请求
    #limit_req_zone $binary_remote_addr zone=one:10m rate=10r/s;

    # 禁止ip访问
    server {
    	listen 80 default_server;
    	listen 443 ssl default_server;
	    server_name _;

        ssl_certificate      "/etc/nginx/cert/manager.enshipeixue.com_bundle.crt";
        ssl_certificate_key  "/etc/nginx/cert/manager.enshipeixue.com.key";

        ssl_session_cache    shared:SSL:1m;
        ssl_session_timeout  5m;

    	return 403;
    }

    server {
        listen       80;
        server_name  manager.enshipeixue.com;
	    rewrite      ^(.*)$ https://$host$1 permanent;
    }


    server {
        listen       443 ssl;
        server_name  manager.enshipeixue.com;

        ssl_certificate      "/etc/nginx/cert/manager.enshipeixue.com_bundle.crt";
        ssl_certificate_key  "/etc/nginx/cert/manager.enshipeixue.com.key";

        ssl_session_cache    shared:SSL:1m;
        ssl_session_timeout  5m;

        ssl_ciphers  HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers  on;

	    location / {
            root   /opt/shopflow/dist;
            index  index.html;
            try_files $uri $uri/ /index.html;
        }

	    location /admin {
            proxy_pass http://127.0.0.1:6914;
            proxy_redirect     off;
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        }

	    location /websocket {
            proxy_pass http://127.0.0.1:6914/websocket;
                proxy_http_version      1.1;
		        proxy_set_header        Host            $host;
		        proxy_set_header        Connection      "upgrade";
		        proxy_set_header 	Upgrade 	$http_upgrade;
            	proxy_set_header 	X-Forwarded-For $proxy_add_x_forwarded_for;
        }

    }

    include /etc/nginx/conf.d/*.conf;
}


