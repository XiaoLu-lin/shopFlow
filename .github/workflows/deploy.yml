name: ShopFlow CI/CD

on:
  workflow_dispatch:
  push:
    branches:
      - main        # 推送到 main 分支时触发
      - master

jobs:
  build-backend:
    name: Build Backend (Java 8 / Maven)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Maven package (skip tests)
        run: mvn -pl litemall-all -am clean package -DskipTests

      - name: Upload backend jar
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: litemall-all/target/litemall-all-*-exec.jar
          retention-days: 1

  build-frontend:
    name: Build Frontend (Node / Vue)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: litemall-admin
        run: npm install --legacy-peer-deps

      - name: Build production
        working-directory: litemall-admin
        env:
          NODE_OPTIONS: --openssl-legacy-provider
        run: npm run build:prod

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: litemall-admin/dist/
          retention-days: 1

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download backend jar
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: ./artifacts/backend

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./artifacts/frontend

      - name: Rename jar
        run: mv ./artifacts/backend/litemall-all-*-exec.jar ./artifacts/backend/shopflow.jar

      - name: Upload jar to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: ./artifacts/backend/shopflow.jar
          target: ${{ secrets.DEPLOY_DIR || '/opt/shopflow' }}/

      - name: Upload frontend dist to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: ./artifacts/frontend/*
          target: ${{ secrets.DEPLOY_DIR || '/opt/shopflow' }}/dist/

      - name: Upload deploy script to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: docker/deploy.sh
          target: ${{ secrets.DEPLOY_DIR || '/opt/shopflow' }}/

      - name: Restart services on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            APP_DIR="${{ secrets.DEPLOY_DIR || '/opt/shopflow' }}"
            chmod +x "$APP_DIR/deploy.sh"
            mkdir -p "$APP_DIR/logs" "$APP_DIR/backups" "$APP_DIR/dist"
            APP_DIR="$APP_DIR" bash "$APP_DIR/deploy.sh"
