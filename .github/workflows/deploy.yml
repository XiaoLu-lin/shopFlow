name: ShopFlow CI/CD

on:
  workflow_dispatch:
  push:
    branches:
      - main        # 推送到 main 分支时触发
      - master

jobs:
  build-backend:
    name: Build Backend (Java 8 / Maven)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Maven package (skip tests)
        run: mvn -pl shopflow-all -am clean package -DskipTests

      - name: Upload backend jar
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: shopflow-all/target/shopflow-all-*-exec.jar
          retention-days: 1

  build-frontend:
    name: Build Admin Frontend (Node / Vue)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: shopflow-admin
        run: npm install --legacy-peer-deps

      - name: Build production
        working-directory: shopflow-admin
        env:
          NODE_OPTIONS: --openssl-legacy-provider
        run: npm run build:prod

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: shopflow-admin/dist/
          retention-days: 1

  build-h5:
    name: Build H5 Frontend (litemall-vue)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 16
        uses: actions/setup-node@v4
        with:
          node-version: '16'

      - name: Install dependencies
        working-directory: litemall-vue
        run: npm install --legacy-peer-deps

      - name: Run compatibility tests
        working-directory: litemall-vue
        run: node scripts/shopflow-compat.test.js

      - name: Build production
        working-directory: litemall-vue
        env:
          VUE_APP_SHOPFLOW_APPID: '1649067'
        run: npm run build

      - name: Upload H5 dist
        uses: actions/upload-artifact@v4
        with:
          name: h5-dist
          path: litemall-vue/dist/
          retention-days: 1
